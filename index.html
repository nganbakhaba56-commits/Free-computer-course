<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guidance Wing - Free Computer Certificate Course Registration</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f4f7f6;
            --text-color: #333;
            --card-background: #ffffff;
            --border-radius: 12px;
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .form-card {
            background: var(--card-background);
            width: 100%;
            max-width: 750px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-banner {
            background-color: var(--primary-color);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .wing-logo {
            display: flex;
            gap: 4px;
        }

        .wing-left, .wing-right {
            width: 24px;
            height: 12px;
            background: rgba(255,255,255,0.8);
            border-radius: 0 0 24px 24px;
            display: inline-block;
        }

        .wing-right {
            transform: scaleX(-1);
        }

        .header-banner h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-banner p {
            font-size: 1.05rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .free-badge {
            background: #ffcc00;
            color: #111;
            padding: 8px 18px;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .institute-info {
            background: rgba(0, 86, 179, 0.03);
            border-bottom: 1px dashed rgba(0, 86, 179, 0.15);
            padding: 24px 40px;
            text-align: left;
        }

        .institute-info p {
            margin: 6px 0;
            color: #4a5568;
            font-size: 0.95rem;
        }

        .form-body {
            padding: 35px 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .form-body {
                padding: 25px 20px;
            }
            .institute-info {
                padding: 20px;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        @media (max-width: 600px) {
            .input-group.full-width {
                grid-column: span 1;
            }
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #4a5568;
        }

        input[type="text"],
        input[type="number"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-color);
            background-color: #f8fafc;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.15);
        }

        .modules-container {
            margin-top: 10px;
        }

        .modules-container h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 14px;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
        }

        .module-card {
            position: relative;
            cursor: pointer;
        }

        .module-card input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .card-content {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            height: 100%;
            transition: var(--transition);
        }

        .card-content .icon {
            font-size: 1.8rem;
        }

        .card-content p {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            line-height: 1.3;
        }

        .module-card input[type="checkbox"]:checked + .card-content {
            background-color: rgba(0, 86, 179, 0.05);
            border-color: var(--primary-color);
        }

        .module-card input[type="checkbox"]:checked + .card-content p {
            color: var(--primary-color);
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
